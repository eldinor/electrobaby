<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BabylonPress GLB Viewer</title>
  <script type="module">
    import "./node_modules/@babylonjs/viewer/dist/babylon-viewer.esm.js";
  </script>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1e1e1e;
      font-family: sans-serif;
    }

    babylon-viewer {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    #empty-state {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      pointer-events: none;
      z-index: 10;
      transition: opacity 160ms ease;
    }

    #empty-state.hidden {
      opacity: 0;
      visibility: hidden;
    }

    #status-banner {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      max-width: min(680px, calc(100vw - 32px));
      padding: 12px 16px;
      border: 1px solid rgba(255, 120, 120, 0.4);
      border-radius: 12px;
      background: rgba(74, 18, 18, 0.92);
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.28);
      color: #ffe5e5;
      font-size: 14px;
      line-height: 1.4;
      z-index: 20;
    }

    #status-banner.hidden {
      display: none;
    }

    .empty-card {
      max-width: 520px;
      padding: 28px 32px;
      border: 1px solid rgba(124, 196, 255, 0.28);
      border-radius: 18px;
      background: rgba(20, 26, 33, 0.86);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      text-align: center;
      color: #e8f3fb;
      backdrop-filter: blur(8px);
      line-height: 2rem;
    }

    .empty-card h1 {
      margin: 0 0 10px;
      font-size: 28px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: #b8cad8;
    }

    .empty-card p {
      margin: 0;
      color: #b8cad8;
      font-size: 15px;
      line-height: 2;
    }

    .empty-card kbd {
      padding: 2px 8px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.08);
      font: inherit;
      color: #ffffff;
    }

    #settings-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      width: min(360px, calc(100vw - 40px));
      max-height: calc(100vh - 40px);
      padding: 20px;
      border: 1px solid rgba(124, 196, 255, 0.24);
      border-radius: 18px;
      background: rgba(16, 21, 28, 0.94);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.38);
      color: #e8f3fb;
      overflow: auto;
      z-index: 30;
      backdrop-filter: blur(12px);
    }

    #settings-panel.hidden,
    #camera-settings-panel.hidden,
    #help-panel.hidden,
    #about-panel.hidden {
      display: none;
    }

    #camera-settings-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      width: min(360px, calc(100vw - 40px));
      max-height: calc(100vh - 40px);
      padding: 20px;
      border: 1px solid rgba(124, 196, 255, 0.24);
      border-radius: 18px;
      background: rgba(16, 21, 28, 0.94);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.38);
      color: #e8f3fb;
      overflow: auto;
      z-index: 30;
      backdrop-filter: blur(12px);
    }

    #help-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      width: min(720px, calc(100vw - 40px));
      max-height: calc(100vh - 40px);
      padding: 22px;
      border: 1px solid rgba(124, 196, 255, 0.24);
      border-radius: 18px;
      background: rgba(16, 21, 28, 0.96);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.38);
      color: #e8f3fb;
      overflow: auto;
      z-index: 30;
      backdrop-filter: blur(12px);
    }

    #about-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      width: min(420px, calc(100vw - 40px));
      max-height: calc(100vh - 40px);
      padding: 22px;
      border: 1px solid rgba(124, 196, 255, 0.24);
      border-radius: 18px;
      background: rgba(16, 21, 28, 0.96);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.38);
      color: #e8f3fb;
      overflow: auto;
      z-index: 30;
      backdrop-filter: blur(12px);
    }

    .about-copy {
      display: grid;
      gap: 16px;
    }

    .about-brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .about-brand img {
      width: 56px;
      height: 56px;
      object-fit: contain;
      border-radius: 14px;
      background: rgba(124, 196, 255, 0.1);
      padding: 8px;
    }

    .about-brand h3 {
      margin: 0 0 4px;
      font-size: 20px;
      color: #f4fbff;
    }

    .about-brand p,
    .about-copy p,
    .about-copy li {
      margin: 0;
      color: #b8cad8;
      font-size: 14px;
      line-height: 1.55;
    }

    .about-meta {
      display: grid;
      gap: 10px;
      padding: 14px 16px;
      border: 1px solid rgba(124, 196, 255, 0.16);
      border-radius: 14px;
      background: rgba(124, 196, 255, 0.08);
    }

    .about-meta strong {
      color: #f4fbff;
    }

    .about-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .about-links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border: 1px solid rgba(124, 196, 255, 0.22);
      border-radius: 10px;
      background: rgba(124, 196, 255, 0.1);
      color: #f4fbff;
      text-decoration: none;
      font-size: 14px;
    }

    .about-links a:hover {
      background: rgba(124, 196, 255, 0.16);
    }

    .help-copy {
      display: grid;
      gap: 18px;
    }

    .help-copy h3 {
      margin: 0 0 8px;
      font-size: 17px;
      font-weight: 600;
      color: #f4fbff;
    }

    .help-copy p,
    .help-copy li {
      margin: 0;
      color: #b8cad8;
      font-size: 14px;
      line-height: 1.55;
    }

    .help-copy ul,
    .help-copy ol {
      margin: 8px 0 0;
      padding-left: 20px;
    }

    .help-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .help-card {
      padding: 16px;
      border: 1px solid rgba(124, 196, 255, 0.16);
      border-radius: 14px;
      background: rgba(124, 196, 255, 0.08);
    }

    @media (max-width: 760px) {
      .help-grid {
        grid-template-columns: 1fr;
      }
    }

    .settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .settings-header h2 {
      margin: 0;
      font-size: 20px;
      font-weight: 500;
      color: #f4fbff;
    }

    .settings-header button {
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      color: #f4fbff;
      cursor: pointer;
      padding: 8px 12px;
    }

    .settings-group {
      margin-bottom: 18px;
    }

    .settings-group label,
    .settings-group legend {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: #b8cad8;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .settings-group input,
    .settings-group select {
      width: 100%;
      box-sizing: border-box;
    }

    .settings-group input[type="range"] {
      accent-color: #7cc4ff;
    }

    .settings-group output {
      display: block;
      margin-top: 6px;
      color: #f4fbff;
      font-size: 13px;
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .settings-row input[type="checkbox"] {
      width: auto;
      transform: scale(1.15);
    }

    .settings-actions {
      display: flex;
      justify-content: flex-end;
    }

    .settings-actions button {
      border: 1px solid rgba(124, 196, 255, 0.28);
      border-radius: 10px;
      background: rgba(124, 196, 255, 0.12);
      color: #f4fbff;
      cursor: pointer;
      padding: 10px 14px;
    }

    body.drag-over {
      outline: 3px dashed #7cc4ff;
      outline-offset: -12px;
      background: #263238;
    }
  </style>
</head>
<body>
  <div id="status-banner" class="hidden" role="status" aria-live="polite"></div>
  <div id="empty-state">
    <div class="empty-card">
      <h1 id="empty-state-title"></h1>
      <p id="empty-state-body"></p>
    </div>
  </div>
  <aside id="settings-panel" class="hidden" aria-label="View settings">
    <div class="settings-header">
      <h2 id="view-panel-title"></h2>
      <button id="close-settings-button" type="button"></button>
    </div>
    <div class="settings-group">
      <label id="tone-mapping-label" for="tone-mapping-select"></label>
      <select id="tone-mapping-select">
        <option id="tone-mapping-option-standard" value="standard"></option>
        <option id="tone-mapping-option-aces" value="aces"></option>
        <option id="tone-mapping-option-neutral" value="neutral"></option>
        <option id="tone-mapping-option-none" value="none"></option>
      </select>
    </div>
    <div class="settings-group">
      <label id="exposure-label" for="exposure-range"></label>
      <input id="exposure-range" type="range" min="0.5" max="2" step="0.05" />
      <output id="exposure-value" for="exposure-range"></output>
    </div>
    <div class="settings-group">
      <label id="contrast-label" for="contrast-range"></label>
      <input id="contrast-range" type="range" min="0.5" max="2" step="0.05" />
      <output id="contrast-value" for="contrast-range"></output>
    </div>
    <div class="settings-group">
      <label id="environment-intensity-label" for="environment-intensity-range"></label>
      <input id="environment-intensity-range" type="range" min="0" max="2" step="0.05" />
      <output id="environment-intensity-value" for="environment-intensity-range"></output>
    </div>
    <div class="settings-group">
      <label id="environment-rotation-label" for="environment-rotation-range"></label>
      <input id="environment-rotation-range" type="range" min="0" max="6.28" step="0.01" />
      <output id="environment-rotation-value" for="environment-rotation-range"></output>
    </div>
    <div class="settings-group">
      <label id="skybox-blur-label" for="skybox-blur-range"></label>
      <input id="skybox-blur-range" type="range" min="0" max="1" step="0.01" />
      <output id="skybox-blur-value" for="skybox-blur-range"></output>
    </div>
    <div class="settings-group">
      <div class="settings-row">
        <label id="environment-visible-label" for="environment-visible-checkbox"></label>
        <input id="environment-visible-checkbox" type="checkbox" />
      </div>
    </div>
    <div class="settings-group">
      <label id="background-color-label" for="background-color-input"></label>
      <input id="background-color-input" type="color" value="#1e1e1e" />
    </div>
    <div class="settings-actions">
      <button id="reset-view-settings-button" type="button"></button>
    </div>
  </aside>
  <aside id="camera-settings-panel" class="hidden" aria-label="Camera settings">
    <div class="settings-header">
      <h2 id="camera-panel-title"></h2>
      <button id="close-camera-settings-button" type="button"></button>
    </div>
    <div class="settings-group">
      <div class="settings-row">
        <label id="camera-auto-rotate-label" for="camera-auto-rotate-checkbox"></label>
        <input id="camera-auto-rotate-checkbox" type="checkbox" />
      </div>
    </div>
    <div class="settings-group">
      <label id="camera-auto-rotate-speed-label" for="camera-auto-rotate-speed-range"></label>
      <input id="camera-auto-rotate-speed-range" type="range" min="0.1" max="4" step="0.1" />
      <output id="camera-auto-rotate-speed-value" for="camera-auto-rotate-speed-range"></output>
    </div>
    <div class="settings-group">
      <label id="camera-auto-rotate-delay-label" for="camera-auto-rotate-delay-range"></label>
      <input id="camera-auto-rotate-delay-range" type="range" min="0" max="5000" step="100" />
      <output id="camera-auto-rotate-delay-value" for="camera-auto-rotate-delay-range"></output>
    </div>
    <div class="settings-actions">
      <button id="reset-camera-settings-button" type="button"></button>
    </div>
  </aside>
  <aside id="help-panel" class="hidden" aria-label="User guide">
    <div class="settings-header">
      <h2 id="help-panel-title">User Guide</h2>
      <button id="close-help-panel-button" type="button">Close</button>
    </div>
    <div id="help-panel-content" class="help-copy"></div>
  </aside>
  <aside id="about-panel" class="hidden" aria-label="About BabylonPress GLB Viewer">
    <div class="settings-header">
      <h2 id="about-panel-title">About</h2>
      <button id="close-about-panel-button" type="button"></button>
    </div>
    <div class="about-copy">
      <div class="about-brand">
        <img src="./bplogo.svg" alt="BabylonPress logo" />
      <div>
          <h3 id="about-app-name">BabylonPress GLB Viewer</h3>
          <p id="about-app-version">Version</p>
        </div>
      </div>
      <p id="about-app-description">Desktop GLB/GLTF viewer powered by Babylon Viewer and Electron.</p>
      <div id="about-primary-links" class="about-links"></div>
      <div id="about-meta" class="about-meta"></div>
      <div id="about-secondary-links" class="about-links"></div>
    </div>
  </aside>
  <babylon-viewer id="viewer"></babylon-viewer>
  <script src="./renderer.js"></script>
</body>
</html>
